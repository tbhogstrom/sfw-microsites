<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav id="tab-nav">
  <a href="/" class="active">Upload</a>
  <a href="/coverage.html">Coverage</a>
  <a href="/gallery.html">Gallery</a>
  <a href="/organize.html">Organize</a>
</nav>
  <div id="app">
    <!-- Left: Queue -->
    <aside id="queue-panel">
      <div id="queue-header">
        <span id="queue-count">0 photos</span>
      </div>
      <div id="queue-list"></div>
    </aside>

    <!-- Drag-drop upload zone -->
    <div id="upload-drop-zone" class="upload-drop-zone">
      <div class="drop-zone-icon">⬇</div>
      <div class="drop-zone-text">Drag images here</div>
    </div>

    <!-- Center: Editor -->
    <main id="editor-panel">
      <div id="center-tabs">
        <button class="center-tab active" data-tab="photo">Photo</button>
        <button class="center-tab" data-tab="preview">Preview in component</button>
      </div>
      <img id="photo-preview" alt="" />
      <div id="component-preview"></div>
      <div id="editor-nav">
        <button id="btn-prev">← Prev</button>
        <span id="editor-position"></span>
        <button id="btn-next">Next →</button>
      </div>
    </main>

    <!-- Right: Upload Options -->
    <aside id="options-panel">
      <div id="upload-context" style="display:none">
        <div id="upload-context-label"></div>
        <button id="upload-context-dismiss" title="Clear context">×</button>
      </div>
      <h2>Upload Options</h2>

      <label>Microsite
        <select id="select-microsite"></select>
      </label>

      <label>Category
        <select id="select-category"></select>
      </label>

      <div id="service-page-row" style="display:none">
        <label>Service page
          <select id="select-service-cluster">
            <option value="">— select page —</option>
          </select>
        </label>
        <label>Subtopic
          <select id="select-service-subtopic">
            <option value="">— select subtopic —</option>
          </select>
        </label>
      </div>

      <div id="page-assign-row" style="display:none">
        <label>Assign to page
          <select id="select-page">
            <option value="">Just upload to blob</option>
            <option value="index">Homepage (index)</option>
          </select>
        </label>
      </div>

      <label>Resize Preset
        <select id="select-preset"></select>
      </label>

      <div id="manual-dimensions">
        <label>Width <input type="number" id="input-width" placeholder="px" /></label>
        <label>Height <input type="number" id="input-height" placeholder="px" /></label>
      </div>

      <label>Quality: <span id="quality-value">85</span>%
        <input type="range" id="input-quality" min="60" max="100" value="85" />
      </label>

      <fieldset>
        <legend>Format</legend>
        <label><input type="radio" name="format" value="keep" checked /> Keep original</label>
        <label><input type="radio" name="format" value="webp" /> Convert to WebP</label>
      </fieldset>

      <div id="action-buttons">
        <button id="btn-skip">Skip</button>
        <button id="btn-upload">Upload</button>
      </div>

      <div id="upload-result"></div>

      <!-- URL Log -->
      <div id="url-log-section">
        <div id="url-log-header">
          <span>Uploaded this session</span>
          <button id="btn-copy-all">Copy all</button>
        </div>
        <div id="url-log-list"></div>
      </div>

      <!-- Generate gallery button -->
      <div id="gallery-generate-section" style="display:none">
        <button id="btn-generate-gallery">⬇ Generate gallery component</button>
        <div id="gallery-generate-hint"></div>
      </div>
    </aside>
  </div>

  <!-- Gallery snippet modal -->
  <div id="gallery-modal" style="display:none">
    <div id="gallery-modal-inner">
      <div id="gallery-modal-header">
        <span>Gallery component snippet</span>
        <button id="btn-modal-copy">Copy</button>
        <button id="btn-modal-close">✕</button>
      </div>
      <pre id="gallery-snippet-text"></pre>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
