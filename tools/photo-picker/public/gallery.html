<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Picker — Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; background: #1a1a1a; color: #e0e0e0; }

    #tab-nav { display: flex; gap: 2px; background: #111; border-bottom: 1px solid #333; padding: 0 16px; }
    #tab-nav a { padding: 10px 18px; color: #888; text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    #tab-nav a.active { color: #fff; border-bottom-color: #4a9eff; }
    #tab-nav a:hover { color: #ccc; }

    #content {
      padding: 24px;
      overflow-y: auto;
      height: calc(100vh - 41px);
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .page-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    select#site-picker {
      background: #222;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      margin-left: auto;
    }

    /* 2-column grid layout */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 24px;
    }

    /* Image card with labels */
    .image-card {
      display: flex;
      flex-direction: column;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .image-card:hover {
      border-color: #4a9eff;
      box-shadow: 0 0 0 1px rgba(74, 158, 255, 0.2);
    }

    .image-card-labels {
      padding: 12px 12px 8px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
    }

    .image-card-cluster {
      font-size: 11px;
      font-weight: 700;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .image-card-subtopic {
      font-size: 12px;
      color: #ccc;
      font-weight: 500;
    }

    .image-card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #1a1a1a;
      overflow: hidden;
    }

    .image-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-card-image button.image-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: #ff6b6b;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      font-weight: 700;
    }

    .image-card-image:hover button.image-remove {
      opacity: 1;
    }

    .image-card-image button.image-remove:hover {
      background: rgba(0, 0, 0, 0.9);
      color: #ff8888;
    }

    /* Empty slots */
    .empty-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      border: 2px dashed #3a3a3a;
      border-radius: 8px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 320px;
    }

    .empty-slot:hover {
      border-color: #4a9eff;
      background: #0d1a2e;
    }

    .empty-slot-icon {
      font-size: 32px;
      color: #555;
      margin-bottom: 12px;
      transition: color 0.2s;
    }

    .empty-slot:hover .empty-slot-icon {
      color: #4a9eff;
    }

    .empty-slot-text {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.4;
    }

    .empty-slot:hover .empty-slot-text {
      color: #4a9eff;
    }

    #loading {
      color: #555;
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav id="tab-nav">
    <a href="/">Upload</a>
    <a href="/coverage.html">Coverage</a>
    <a href="/gallery.html" class="active">Gallery</a>
    <a href="/organize.html">Organize</a>
  </nav>

  <div id="content">
    <div class="page-header">
      <h1>Gallery by Service</h1>
      <select id="site-picker"></select>
    </div>
    <div id="loading">Loading...</div>
    <div id="gallery-body"></div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
